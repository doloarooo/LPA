 document.querySelectorAll('.area').forEach(function(el){el.setAttribute('fill',fill(el,m));el.setAttribute('fill-opacity',el.classList.contains('pt')?0.9:0.82);});legend(m);}
function legend(m){var h='',L=document.getElementById('legend');
 if(m==='diff'){['lost','down','up','new'].forEach(function(k){h+='<span class="it"><span class="sw" style="background:'+DIFF[k]+'"></span>'+DIFFLAB[k]+'</span>';});}
 else{var b=[['#bd0026','1000人以上'],['#f03b20','500-999'],['#fd8d3c','150-499'],['#fecc5c','50-149'],['#ffffb2','1-49'],['#e8e8e8','0（圏外）']];

 h+='<span class="it"><span class="sw" style="background:#00c2d1;border-radius:50%"></span>多治見店</span>';L.innerHTML=h;}
var tip=document.getElementById('tip');
document.querySelectorAll('.area').forEach(function(el){function show(e){var d=+el.getAttribute('data-diff');
 var a=d>0?'▲+'+d:(d<0?'▼'+d:'±0');
 tip.innerHTML='<b>'+el.getAttribute('data-name')+'</b><br>2024: '+el.getAttribute('data-v24')+' 人<br>2026: '+el.getAttribute('data-v26')+' 人<br>増減: '+a;
 tip.style.display='block';var x=(e.touches?e.touches[0].clientX:e.clientX),y=(e.touches?e.touches[0].clientY:e.clientY);
 tip.style.left=Math.min(x+12,window.innerWidth-160)+'px';tip.style.top=(y+12)+'px';}
 el.addEventListener('mousemove',show);el.addEventListener('mouseleave',function(){tip.style.display='none';});el.addEventListener('click',show);});
